<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foxxo's Den Web Page</title>
    <link rel="icon" href="./images/FoxxosDenLogo.png" type="image/x-icon">
    <style>
        body {
            background-image: url('./images/SwimmingFox.jpeg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            width: 100%;
            height: 100vh;
            font-size:large;
            font-family: cursive;
        }

        li {
            list-style-type: none;
        }

        nav {
        position:fixed;
        top: 0;
        right: 0;
        left: 0;
        height: 60px;
        background-color: #422701;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        z-index: 8;
        border-bottom: 5px solid black;
        border-radius: 0px 0px 15px 15px;
    }

    .links-container {
        height:100%;
        width: 100%;
        display: flex;
        flex-direction: row;
        align-items: center;

    }

    nav a {
        height: 100%;
        padding: 0 20px;
        display: flex;
        align-items: center;
        text-decoration: none;
        color: white;
    }

    nav a:hover {
        background-color:tan;
    }

    nav .home-link {
        margin-right: auto;
    }

    nav svg {
        fill: white;
    }

    #sidebar-active {
        display: none;
    }

    .open-sidebar-button, .close-sidebar-button {
        display: none;
        

    }

    @media (max-width: 735px) {
        .links-container {
            flex-direction: column;
            align-items: flex-start;

            position: fixed;
            top: 0;
            right: -100%;
            z-index: 10;
            width: 200px;
            background-color: #422701;

            box-shadow: -5px 0 5px rgba(0, 0, 0, 0.25);
            transition: 0.75s ease-out;
        }

        nav a {
            box-sizing: border-box;
            height: 20%;
            width: 100%;
            padding:  20px 30px;
            justify-content: flex-start;
        }

        .open-sidebar-button, .close-sidebar-button {
            padding: 20px;
            display: block;
        
        }

        #sidebar-active:checked ~ .links-container {
            right: 0;
        }

        #sidebar-active:checked ~ #overlay {
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }
    }


        .header {
            display:flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.414);
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 5px solid black;
            border-radius: 15px;
            width: 90%;
            height: auto;
            align-items: center;
            margin: 100px auto 50px auto;
        }

        .music {
            display: flex;
            flex-direction: column;
            margin-top: 25px;
            gap: 25px;
        }

        iframe {
            border: 3px solid black;
            border-radius: 22px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.7);
        }

        h1, h2 {
            text-align: center;
            color: black;
        }

        .socialPanel {
            width:100%
        }
        .paneling {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;

            padding: 0;
        }

        .panel > a > img {
            width: 50px;
            border: 2px solid black;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.7);

            transition: all 0.3s ease-in-out;
        }

        .panel > a > img:hover {
            width: 60px;
            border: 2px solid black;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.7);
        }

        footer {
            margin-bottom: 25px;
            text-align: center;
        }

        
    </style>
</head>
